<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>URL, Instant Copy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-wrapper">

      <!-- Header -->
      <div class="popup-header">
        <span class="popup-tag">extension</span>
        <span class="popup-version">v1.0</span>
      </div>

      <!-- Title -->
      <div class="popup-title-row">
        <img src="Icons/icon16.png" alt="" class="popup-icon" />
        <h1>URL, Instant <span class="highlight">Copy</span></h1>
      </div>

      <!-- Description -->
      <p>Instantly copies the current page URL to your clipboard.</p>

      <!-- Keyboard Shortcuts -->
      <div class="shortcuts">
        <div class="kbd-row">
          <span class="kbd-label">Mac</span>
          <kbd>⌥ Option + ⇧ Shift + C</kbd>
        </div>
        <div class="kbd-row">
          <span class="kbd-label">Windows</span>
          <kbd>Alt + Shift + C</kbd>
        </div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span>built by</span>
        <a href="https://linktr.ee/prshv1" target="_blank" rel="noreferrer noopener">
          Parshva ↗
        </a>
      </div>

    </div>
  </body>
</html>
